name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        run: npm run build

  ai-review:
    name: AI Code Review
    needs: quality-gates
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: Review with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request

          diff = open("pr.diff").read()
          if len(diff) > 30000:
              diff = diff[:30000] + "\n\n[diff truncated — file too large]"

          if not diff.strip():
              open("review.md", "w").write("## AI Code Review\n\nNo diff detected.")
              exit()

          payload = {
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "messages": [{
                  "role": "user",
                  "content": (
                      "You are a code reviewer for a Next.js / TypeScript project. "
                      "Review the following PR diff. Focus only on real issues: bugs, "
                      "security problems, hydration mismatches, accessibility gaps, and "
                      "significant code quality concerns. Skip nitpicks. "
                      "Format your response as GitHub-flavored markdown with a brief summary "
                      "followed by a bulleted list of findings. If there are no issues, say so.\n\n"
                      "```diff\n" + diff + "\n```"
                  )
              }]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json",
              },
          )

          with urllib.request.urlopen(req) as resp:
              result = json.loads(resp.read())

          review = result["content"][0]["text"]
          open("review.md", "w").write("## AI Code Review\n\n" + review)
          EOF

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
